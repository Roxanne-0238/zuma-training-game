<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>祖玛训练 · Zuma Trainer</title>
<style>
/* ================================================================== */
/* RESET & BASE — 祖玛神庙风格                                          */
/* ================================================================== */
:root {
  --red:       #E24B4A;
  --red-dark:  #b83a39;
  --green:     #639922;
  --green-dark:#4d7a1a;
  --blue:      #378ADD;
  --blue-dark: #2a6db3;
  --yellow:    #EF9F27;
  --yellow-dark:#c47e1a;
  --gold:      #FFD060;
  --gold-dim:  #b8943a;
  --amber:     #FFB347;
  --bg:        #1A1208;
  --surface:   #241a0c;
  --surface2:  #2d2010;
  --surface3:  #352818;
  --text:      #e8dfd0;
  --muted:     #9a8e78;
  --radius:    10px;
  --font:      'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  min-height: 100vh;
}

/* ---- Stone texture + vignette ---- */
body {
  display: flex; justify-content: center; align-items: flex-start;
  padding: 12px; position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 25% 15%, rgba(140,110,60,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 40%, rgba(140,110,60,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 85%, rgba(0,0,0,0.4) 0%, transparent 65%);
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
}

/* ---- App shell — mobile-first, max 390px ---- */
.app-shell {
  position: relative; z-index: 2;
  background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
  border-radius: 16px; padding: 22px 16px;
  max-width: 390px; width: 100%;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.03);
  min-height: 560px;
  display: flex; flex-direction: column;
  border: 1px solid rgba(255,255,255,0.05);
}

/* ---- Header — 深色卡片 + 金色文字 ---- */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; gap: 10px;
  background: var(--surface3);
  border-radius: var(--radius);
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.05);
}
.app-header .logo {
  font-size: 16px; font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.app-header .nav-btn {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,208,96,0.25);
  color: var(--gold-dim); padding: 5px 12px; border-radius: 14px;
  font-size: 11px; cursor: pointer; font-family: inherit; transition: all 200ms;
}
.app-header .nav-btn:hover {
  border-color: var(--gold); color: var(--gold);
  box-shadow: 0 0 8px rgba(255,208,96,0.15);
}

/* ---- Page visibility ---- */
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }

/* ---- Section title ---- */
.section-title {
  font-size: 11px; color: var(--gold-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px; text-align: center;
}

/* ---- Skill tag ---- */
.skill-tag {
  display: inline-block; background: rgba(255,208,96,0.08);
  padding: 2px 10px; border-radius: 10px; font-size: 10px;
  color: var(--gold-dim); border: 1px solid rgba(255,208,96,0.12);
}

/* ---- Star ---- */
.star { color: #3a3025; font-size: 18px; text-shadow: 0 1px 0 rgba(0,0,0,0.3); }
.star.filled { color: var(--gold); text-shadow: 0 0 6px rgba(255,208,96,0.4); }

/* ---- Buttons — 深色底+金色边框+金色文字 ---- */
.btn {
  padding: 10px 22px; border-radius: 22px; border: 1.5px solid rgba(255,208,96,0.35);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font);
  transition: all 200ms; display: inline-flex; align-items: center; gap: 6px;
  background: rgba(20,10,4,0.8); color: var(--gold-dim);
}
.btn:active { transform: scale(0.95); }
.btn-primary {
  background: linear-gradient(180deg, rgba(40,25,8,0.9) 0%, rgba(20,10,4,0.95) 100%);
  border-color: var(--gold); color: var(--gold);
  box-shadow: 0 0 12px rgba(255,208,96,0.12);
}
.btn-primary:hover {
  box-shadow: 0 0 20px rgba(255,208,96,0.25);
  border-color: #ffe08a;
}
.btn-accent {
  background: linear-gradient(180deg, rgba(255,179,71,0.2) 0%, rgba(180,130,40,0.2) 100%);
  border-color: var(--amber); color: var(--amber);
  box-shadow: 0 0 12px rgba(255,179,71,0.15);
}
.btn-accent:hover { box-shadow: 0 0 22px rgba(255,179,71,0.3); }
.btn-outline {
  background: transparent; color: var(--muted);
  border: 1px solid rgba(255,255,255,0.12);
}
.btn-outline:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.btn-sm { padding: 5px 14px; font-size: 11px; border-radius: 16px; }
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ================================================================== */
/* PAGE 0: HOME                                                        */
/* ================================================================== */
.home-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px; text-align: center; padding: 20px 0;
}
.home-icon {
  font-size: 72px;
  animation: home-float 2.8s ease-in-out infinite;
  filter: drop-shadow(0 4px 20px rgba(255,179,71,0.3));
}
@keyframes home-float {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}
.home-title {
  font-size: 28px; font-weight: 800; color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 0 30px rgba(255,208,96,0.2);
}
.home-subtitle {
  font-size: 13px; color: var(--gold-dark);
  line-height: 1.7; max-width: 260px;
}
/* Decorative mini balls row */
.home-balls {
  display: flex; gap: 8px; justify-content: center;
}
.home-ball {
  width: 16px; height: 16px; border-radius: 50%;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.home-ball::after {
  content: ''; position: absolute;
  top: 12%; left: 18%; width: 38%; height: 28%;
  background: rgba(255,255,255,0.35); border-radius: 50%;
  transform: rotate(-28deg); pointer-events: none;
}
.home-start-btn {
  padding: 14px 48px; border-radius: 26px;
  border: 2px solid var(--gold);
  font-size: 17px; font-weight: 700; cursor: pointer;
  font-family: inherit; letter-spacing: 1px;
  background: linear-gradient(180deg, rgba(45,28,8,0.95) 0%, rgba(20,10,4,0.98) 100%);
  color: var(--gold);
  box-shadow: 0 0 24px rgba(255,208,96,0.18);
  transition: all 200ms;
}
.home-start-btn:active { transform: scale(0.95); box-shadow: 0 0 36px rgba(255,208,96,0.3); }
.home-footer {
  font-size: 10px; color: rgba(255,255,255,0.15);
  letter-spacing: 1px;
}

/* ================================================================== */
/* PAGE 1: GUIDE — 教学总览 + 动画演示                                   */
/* ================================================================== */
.guide-content { flex: 1; display: flex; flex-direction: column; }

/* ---- Overview mode ---- */
.tutorial-overview { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.tutorial-overview .tut-section-title {
  font-size: 12px; color: var(--gold-dim); text-transform: uppercase;
  letter-spacing: 1.5px; text-align: center; margin-bottom: 4px;
}
.tut-card {
  display: flex; align-items: center; gap: 14px;
  background: #261A08;
  border: 1px solid #3D2E10;
  border-radius: 12px;
  padding: 16px 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.35);
  cursor: pointer;
  transition: all 200ms;
}
.tut-card:active { transform: scale(0.97); }
.tut-card.locked { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.4); }
.tut-card.locked:active { transform: none; }
.tut-card.completed { border-color: rgba(255,208,96,0.2); }
.tut-card .tut-icon {
  font-size: 32px; flex-shrink: 0; width: 48px; text-align: center;
}
.tut-card .tut-info { flex: 1; min-width: 0; }
.tut-card .tut-info .tut-name {
  font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px;
}
.tut-card .tut-info .tut-desc {
  font-size: 11px; color: #8A7040; line-height: 1.5;
}
.tut-card .tut-badge {
  font-size: 10px; padding: 3px 8px; border-radius: 8px;
  background: rgba(255,208,96,0.1); color: var(--gold-dim);
  border: 1px solid rgba(255,208,96,0.15); white-space: nowrap;
}
.tut-card.completed .tut-badge { background: rgba(99,153,34,0.1); color: var(--green); border-color: rgba(99,153,34,0.2); }
.tut-card .tut-arrow { color: var(--gold-dim); font-size: 16px; flex-shrink: 0; }

/* ---- Playing mode (animation) ---- */
.tutorial-play { flex: 1; display: flex; flex-direction: column; gap: 14px; }
.tutorial-play .teach-card {
  background: #261A08;
  border: 1px solid #3D2E10;
  border-radius: 14px;
  padding: 22px 16px 18px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.45);
  display: flex; flex-direction: column; align-items: center;
  gap: 14px;
}
.tutorial-play .ball-row {
  display: flex; align-items: center; justify-content: flex-start;
  flex-wrap: nowrap; overflow-x: auto;
  background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.3) 100%);
  border-radius: 28px; padding: 10px 8px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
  border: 1px solid rgba(0,0,0,0.25);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tutorial-play .ball-row::-webkit-scrollbar { display: none; }
.tutorial-play .ball {
  width: 42px; height: 42px; border-radius: 50%;
  position: relative; overflow: hidden;
  box-shadow: inset 0 -4px 8px rgba(0,0,0,0.4), 0 3px 8px rgba(0,0,0,0.5);
  flex-shrink: 0;
}
.tutorial-play .ball::after {
  content: ''; position: absolute;
  top: 11%; left: 17%; width: 40%; height: 30%;
  background: rgba(255,255,255,0.32); border-radius: 50%;
  transform: rotate(-28deg); pointer-events: none;
}
.tutorial-play .insert-slot {
  width: 24px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative;
}
.tutorial-play .insert-slot::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.1); pointer-events: none;
}
.tutorial-play .insert-slot.hint::after {
  background: #FFB347; transform: scale(2.5);
  box-shadow: 0 0 16px rgba(255,179,71,0.8), 0 0 32px rgba(255,179,71,0.4);
  animation: pulse-hint 1.1s ease-in-out infinite;
}
@keyframes pulse-hint {
  0%,100% { box-shadow: 0 0 16px rgba(255,179,71,0.6), 0 0 28px rgba(255,179,71,0.3); }
  50%     { box-shadow: 0 0 26px rgba(255,179,71,1.0), 0 0 46px rgba(255,179,71,0.55); }
}
.tutorial-play .teach-title {
  font-size: 17px; font-weight: 700; color: var(--text); text-align: center;
}
.tutorial-play .teach-desc {
  font-size: 13px; color: #8A7040; text-align: center; line-height: 1.7; min-height: 36px;
  transition: opacity 300ms;
}
.tutorial-play .teach-divider {
  width: 100%; height: 1px; background: #3D2E10; opacity: 0.5;
}
.tutorial-play .teach-next-label {
  font-size: 12px; color: #8A7040; letter-spacing: 0.5px;
}
.tutorial-play .teach-next-ball {
  width: 50px; height: 50px; border-radius: 50%; position: relative; overflow: hidden;
  box-shadow: inset 0 -4px 8px rgba(0,0,0,0.35), 0 0 28px currentColor, 0 0 48px currentColor;
  animation: pulse-glow 1.5s ease-in-out infinite; flex-shrink: 0;
  background-color: var(--ball-color, #555);
}
.tutorial-play .teach-next-ball::after {
  content: ''; position: absolute;
  top: 11%; left: 17%; width: 40%; height: 30%;
  background: rgba(255,255,255,0.34); border-radius: 50%;
  transform: rotate(-28deg); pointer-events: none;
}
.tutorial-play .teach-next-ball::before {
  content: ''; position: absolute;
  bottom: -4%; left: 5%; width: 90%; height: 38%;
  background: rgba(0,0,0,0.2); border-radius: 50%; pointer-events: none;
}
@keyframes pulse-glow {
  0%,100% { box-shadow: inset 0 -4px 8px rgba(0,0,0,0.35), 0 0 22px currentColor, 0 0 38px currentColor; }
  50%     { box-shadow: inset 0 -4px 8px rgba(0,0,0,0.35), 0 0 34px currentColor, 0 0 58px currentColor; }
}
/* ---- Playing bottom bar ---- */
.tutorial-play .play-bottom {
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
}
.tutorial-play .play-dots { display: flex; gap: 7px; }
.tutorial-play .play-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.1); transition: all 300ms;
}
.tutorial-play .play-dot.active { background: var(--gold); width: 20px; border-radius: 3px; }
.tutorial-play .play-dot.done { background: var(--green); }
/* ---- Glow on adjacent balls during hint ---- */
.tutorial-play .ball.glow {
  animation: ball-glow 0.8s ease-in-out infinite;
}
@keyframes ball-glow {
  0%,100% { box-shadow: inset 0 -4px 8px rgba(0,0,0,0.4), 0 3px 8px rgba(0,0,0,0.5), 0 0 12px var(--ball-color, #fff); }
  50%     { box-shadow: inset 0 -4px 8px rgba(0,0,0,0.4), 0 3px 8px rgba(0,0,0,0.5), 0 0 28px var(--ball-color, #fff), 0 0 42px var(--ball-color, #fff); }
}
/* ---- Preview next-next ball (guided mode) ---- */
.next-preview {
  display: flex; align-items: center; gap: 10px; justify-content: center;
}
.next-preview-ball {
  width: 26px; height: 26px; border-radius: 50%;
  position: relative; overflow: hidden; flex-shrink: 0;
  opacity: 0.35; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.next-preview-ball::after {
  content: ''; position: absolute;
  top: 11%; left: 17%; width: 38%; height: 28%;
  background: rgba(255,255,255,0.28); border-radius: 50%;
  transform: rotate(-28deg); pointer-events: none;
}

/* ---- Modal overlay ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 200ms ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--surface2);
  border: 1px solid rgba(255,208,96,0.2);
  border-radius: 16px;
  padding: 28px 24px 22px;
  max-width: 300px; width: 90%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.modal-box h3 {
  font-size: 18px; font-weight: 700; color: var(--gold);
  margin-bottom: 6px;
}
.modal-box p {
  font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.6;
}
.modal-box .modal-btns {
  display: flex; flex-direction: column; gap: 10px;
}
.modal-box .modal-btn {
  padding: 14px 20px; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: all 200ms;
  border: 1.5px solid rgba(255,208,96,0.3);
  background: rgba(20,10,4,0.85); color: var(--gold-dim);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.modal-box .modal-btn:active { transform: scale(0.96); }
.modal-box .modal-btn.primary {
  border-color: var(--gold); color: var(--gold);
  background: linear-gradient(180deg, rgba(40,25,8,0.9) 0%, rgba(20,10,4,0.95) 100%);
  box-shadow: 0 0 16px rgba(255,208,96,0.12);
}
.modal-box .modal-close {
  margin-top: 14px; font-size: 12px; color: var(--muted);
  background: none; border: none; cursor: pointer; font-family: inherit;
}

/* ---- Guided mode top bar ---- */
.guided-top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; flex-wrap: wrap;
  background: var(--surface3); border-radius: var(--radius);
  padding: 10px 12px; border: 1px solid rgba(255,255,255,0.05);
}
.guided-top .gt-stat {
  text-align: center; min-width: 40px;
}
.guided-top .gt-stat .gt-val { font-size: 16px; font-weight: 700; color: var(--text); }
.guided-top .gt-stat .gt-label { font-size: 9px; color: var(--muted); }
.guided-top .gt-btns { display: flex; gap: 6px; }

/* ---- Guided result ---- */
.guided-result {
  text-align: center; padding: 12px;
  background: var(--surface3); border-radius: var(--radius);
  border: 1px solid rgba(255,208,96,0.1);
}
.guided-result .gr-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.guided-result .gr-stats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.guided-result .gr-stat {
  background: var(--surface); padding: 10px 14px;
  border-radius: 8px; text-align: center; min-width: 60px;
}
.guided-result .gr-stat .gr-val { font-size: 22px; font-weight: 700; }
.guided-result .gr-stat .gr-label { font-size: 9px; color: var(--muted); }

/* ================================================================== */
/* PAGE 2: LEVELS                                                      */
/* ================================================================== */
.levels-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; flex: 1; align-content: start;
}
.level-card {
  background: var(--surface3); border-radius: var(--radius);
  padding: 14px 10px; cursor: pointer; transition: all 200ms;
  border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
}
.level-card:hover {
  border-color: rgba(255,208,96,0.3);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.level-card.locked { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.5); }
.level-card.locked:hover { border-color: rgba(255,255,255,0.05); transform: none; box-shadow: none; }
.level-card.completed { border-color: rgba(255,208,96,0.2); }
.level-card .lc-num { font-size: 20px; font-weight: 700; margin-bottom: 2px; color: var(--gold); }
.level-card .lc-name { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.level-card .lc-stars { margin-bottom: 4px; }
.level-card .lc-skills { display: flex; flex-wrap: wrap; gap: 3px; }
.level-card .lc-lock { position: absolute; right: 8px; top: 8px; font-size: 14px; opacity: 0.6; }

/* ================================================================== */
/* PAGE 3: GAME                                                        */
/* ================================================================== */
.game-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 6px; flex-wrap: wrap;
  background: var(--surface3); border-radius: var(--radius);
  padding: 10px 12px; border: 1px solid rgba(255,255,255,0.05);
}
.game-stat { text-align: center; min-width: 44px; }
.game-stat .gs-val { font-size: 18px; font-weight: 700; color: var(--text); }
.game-stat .gs-label { font-size: 9px; color: var(--muted); margin-top: 1px; }

/* ---- Queue display ---- */
.queue-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 14px; padding: 10px 14px;
  background: var(--surface3); border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.05);
}
.queue-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.queue-next {
  width: 42px; height: 42px; border-radius: 50%; position: relative; overflow: hidden;
  box-shadow: 0 0 18px currentColor;
  animation: pulse-glow 1.2s ease-in-out infinite;
  transition: all 200ms;
}
.queue-next::after {
  content: ''; position: absolute; top: 10%; left: 18%; width: 40%; height: 30%;
  background: rgba(255,255,255,0.32); border-radius: 50%; transform: rotate(-25deg);
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 12px currentColor; }
  50%     { box-shadow: 0 0 28px currentColor, 0 0 42px currentColor; }
}
.queue-remaining { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
.queue-remaining .qr-dot {
  width: 18px; height: 18px; border-radius: 50%; position: relative; overflow: hidden;
  opacity: 0.55; transition: all 300ms;
}
.queue-remaining .qr-dot::after {
  content: ''; position: absolute; top: 10%; left: 18%; width: 36%; height: 28%;
  background: rgba(255,255,255,0.28); border-radius: 50%; transform: rotate(-25deg);
}

/* ---- Chain track — 深色凹槽 ---- */
.chain-area {
  background:
    linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.15) 25%, rgba(0,0,0,0.15) 75%, rgba(0,0,0,0.45) 100%),
    var(--surface);
  border-radius: var(--radius); padding: 18px 10px; margin-bottom: 14px;
  min-height: 96px; display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(0,0,0,0.4);
  box-shadow: inset 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
}
.chain-row { display: flex; flex-direction: column; align-items: center; gap: 0; }
.chain-subrow { display: flex; align-items: center; }
.chain-subrow.reverse { flex-direction: row-reverse; }
.chain-connector {
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,208,96,0.2), transparent);
  margin: 2px 0;
}

/* ---- Ball — 3D光泽球体 ---- */
.ball {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
  transition: transform 300ms ease, opacity 300ms ease;
  box-shadow:
    inset 0 -3px 6px rgba(0,0,0,0.35),
    0 2px 6px rgba(0,0,0,0.4);
  flex-shrink: 0;
  background-color: var(--ball-color);
}
/* 3D highlight: white ellipse top-left */
.ball::after {
  content: ''; position: absolute;
  top: 10%; left: 16%;
  width: 42%; height: 32%;
  background: rgba(255,255,255,0.30);
  border-radius: 50%;
  transform: rotate(-28deg);
  pointer-events: none;
}
/* Subtle dark shadow at bottom */
.ball::before {
  content: ''; position: absolute;
  bottom: -5%; left: 5%;
  width: 90%; height: 40%;
  background: rgba(0,0,0,0.18);
  border-radius: 50%;
  pointer-events: none;
}
.ball.removing { transform: scale(0); opacity: 0; }
/* ---- Particle burst ---- */
.particle {
  position: fixed; pointer-events: none; z-index: 200;
  border-radius: 2px;
  animation: particle-fly 0.5s ease-out forwards;
}
@keyframes particle-fly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

/* ---- Insertion slot — 琥珀色光晕hover ---- */
.insert-slot {
  width: 24px; height: 42px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0; position: relative;
}
.insert-slot::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.10); transition: all 250ms;
}
.insert-slot:hover::after {
  background: var(--amber);
  transform: scale(2.2);
  box-shadow: 0 0 14px rgba(255,179,71,0.7), 0 0 28px rgba(255,179,71,0.3);
}
.insert-slot.selected::after {
  background: var(--amber);
  transform: scale(2);
  box-shadow: 0 0 16px rgba(255,179,71,0.8), 0 0 32px rgba(255,179,71,0.35);
}
.insert-slot .slot-idx {
  position: absolute; top: -11px; font-size: 8px;
  color: var(--muted); opacity: 0; transition: opacity 200ms;
}
.insert-slot:hover .slot-idx,
.insert-slot.selected .slot-idx { opacity: 0.8; color: var(--amber); }

/* ---- Hint bar ---- */
.hint-bar {
  text-align: center; font-size: 12px; color: var(--gold-dim);
  min-height: 18px; margin-bottom: 10px; transition: all 200ms;
}

/* ---- Level end panel ---- */

/* ================================================================== */
/* PAGE 4: RESULT                                                      */
/* ================================================================== */
.result-card {

/* ================================================================== */
/* PAGE 5: GRADUATION                                                  */
/* ================================================================== */

const STORAGE_KEY = 'zuma_trainer_progress';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveProgress(progress) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

/** Update completion for a level, only if better than previous */
function updateLevelProgress(levelId, steps, allCleared) {
  const p = loadProgress();
  const prev = p[levelId];
  const stars = allCleared ? (steps <= getLevel(levelId).par ? 3 : steps <= getLevel(levelId).par * 2 ? 2 : 1) : 0;
  if (!prev || stars > prev.stars || (stars === prev.stars && steps < prev.bestSteps)) {
    p[levelId] = {
      completed: stars > 0,
      stars: stars,
      bestSteps: allCleared ? steps : (prev ? prev.bestSteps : 0),
      attempts: (prev ? prev.attempts : 0) + 1,
      lastPlayed: Date.now()
    };
    saveProgress(p);
  } else if (prev) {
    // Still increment attempts
    p[levelId].attempts = (prev.attempts || 0) + 1;
    p[levelId].lastPlayed = Date.now();
    saveProgress(p);
  }
  return p[levelId];
}

function getLevel(id) {
  return ZUMA_LEVELS.find(l => l.id === id);
}

function isLevelUnlocked(id) {
  if (id === 1) return true;
  // Tutorial-seen users get all existing levels unlocked
  if (localStorage.getItem('zuma_tutorial_seen') && id <= ZUMA_LEVELS.length) return true;
  const p = loadProgress();
  const prev = p[id - 1];
  const prev2 = p[id - 2];
  if (prev && prev.completed) return true;
  if (prev2 && prev2.completed) return true;
  if (prev && prev.attempts >= 1) return true;
  return false;
}

function countCompletedLevels() {
  const p = loadProgress();
  return Object.values(p).filter(v => v.completed).length;
}

function isAllCompleted() {
  return countCompletedLevels() >= ZUMA_LEVELS.length;
}

// ======================================================================
// ======================================================================
// OPTIMAL SOLVER (BFS)
// ======================================================================
function applyMatchesToChain(chain) {
  // Repeatedly find and remove matches until none left
  let changed = true;
  while (changed) {
    changed = false;
    for (let i = 0; i < chain.length; i++) {
      const match = findMatches(chain, i);
      if (match) {
        chain.splice(match.left, match.right - match.left + 1);
        changed = true;
        break;
      }
    }
  }
  return chain;
}

function solveOptimal(chainColors, queueColors) {
  // BFS: find minimum steps to clear all balls
  const initialChain = chainColors.map((c, i) => ({ color: c, id: i }));
  let nextId = chainColors.length;

  const queue = [{ chain: initialChain, queueIdx: 0, steps: [] }];
  const seen = new Set();
  const MAX_STATES = 500000;
  let visited = 0;

  while (queue.length > 0 && visited < MAX_STATES) {
    const state = queue.shift();
    visited++;
    const key = state.chain.map(b => b.color[0]).join('') + '|' + state.queueIdx;

    if (seen.has(key)) continue;
    seen.add(key);

    if (state.chain.length === 0) {
      return state.steps;
    }

    if (state.queueIdx >= queueColors.length) continue;

    const color = queueColors[state.queueIdx];
    for (let i = 0; i <= state.chain.length; i++) {
      const newChain = state.chain.map(b => ({ color: b.color, id: b.id }));
      newChain.splice(i, 0, { color, id: nextId++ });
      const afterMatches = applyMatchesToChain(newChain);

      queue.push({
        chain: afterMatches,
        queueIdx: state.queueIdx + 1,
        steps: [...state.steps, { slot: i }],
      });
    }
  }

  return null; // no solution found or max states reached
}

// Pre-compute optimal solutions for all tutorials
function computeOptimalForScript(script) {
  return solveOptimal(script.initialChain, script.queue);
}

// TUTORIAL PLAYER — 动画引擎
// ======================================================================
let tutPlayer = null;

function createTutorialPlayer() {
  return {
    script: null,
    stepIdx: 0,
    timers: [],
    chain: [],
    nextId: 0,
    queue: [],
    queueIdx: 0,
    running: false,
    onComplete: null,
    onStepChange: null,

    load(script) {
      this.script = script;
      this.stepIdx = 0;
      this.chain = script.initialChain.map((c, i) => ({ color: c, id: i }));
      this.nextId = script.initialChain.length;
      this.queue = [...script.queue];
      this.queueIdx = 0;
      this.running = false;
      this.timers = [];
    },

    play() {
      this.running = true;
      this.stepIdx = 0;
      this._renderAll();
      this._runStep();
    },

    stop() {
      this.running = false;
      this.timers.forEach(clearTimeout);
      this.timers = [];
    },

    skip() {
      this.stop();
      if (this.onComplete) this.onComplete('skipped');
    },

    _setTimer(fn, delay) {
      const t = setTimeout(() => {
        this.timers = this.timers.filter(x => x !== t);
        fn();
      }, delay);
      this.timers.push(t);
      return t;
    },

    _runStep() {
      if (!this.running) return;
      if (this.stepIdx >= this.script.steps.length) return;
      const step = this.script.steps[this.stepIdx];
      if (this.onStepChange) this.onStepChange(this.stepIdx, step);

      switch (step.type) {
        case 'message':
          this._renderAll();
          this._setTimer(() => { this.stepIdx++; this._runStep(); }, step.pause);
          break;
        case 'highlight':
          this._renderAll(step.slotIdx);
          this._setTimer(() => { this.stepIdx++; this._runStep(); }, step.pause);
          break;
        case 'insert':
          this._doInsert(step);
          break;
        case 'summary':
          this._renderAll();
          // Show summary card in the desc area
          if (this.onStepChange) this.onStepChange(this.stepIdx, step);
          this._setTimer(() => { this.stepIdx++; this._runStep(); }, 6000);
          break;
        case 'end':
          this.stop();
          if (this.onComplete) this.onComplete('completed');
          break;
      }
    },

    _doInsert(step) {
      const color = this.queue[this.queueIdx++];
      this.chain.splice(step.slotIdx, 0, { color, id: this.nextId++ });
      this._renderAll();

      this._setTimer(() => {
        const match = findMatches(this.chain, step.slotIdx);
        if (match) {
          this._animateMatch(match, () => {
            this.stepIdx++;
            this._runStep();
          });
        } else {
          this.stepIdx++;
          this._runStep();
        }
      }, 600);
    },

    _animateMatch(match, callback) {
      // Add removing class to matched balls in DOM
      const row = document.getElementById('tutChainRow');
      if (row) {
        for (let i = match.left; i <= match.right; i++) {
          const ball = row.querySelector('.ball[data-index="' + i + '"]');
          if (ball) {
            burstParticles(ball);
            ball.classList.add('removing');
          }
        }
      }

      this._setTimer(() => {
        this.chain.splice(match.left, match.right - match.left + 1);
        this._renderAll();

        const gapIdx = Math.min(match.left, this.chain.length - 1);
        if (this.chain.length > 0 && gapIdx >= 0) {
          this._setTimer(() => {
            const nextMatch = findMatches(this.chain, gapIdx);
            if (nextMatch) {
              this._animateMatch(nextMatch, callback);
            } else {
              callback();
            }
          }, 150);
        } else {
          callback();
        }
      }, 300);
    },

    _renderAll(hintSlotIdx) {
      this._renderChain(hintSlotIdx);
      this._renderNextBall();
    },

    _renderChain(hintSlotIdx) {
      const row = document.getElementById('tutChainRow');
      if (!row) return;
      row.innerHTML = '';

      this._renderSlot(row, 0, hintSlotIdx);

      this.chain.forEach((ball, i) => {
        const el = document.createElement('div');
        el.className = 'ball';
        el.dataset.index = i;
        // Glow if this ball is adjacent to the hint slot
        if (hintSlotIdx !== undefined && (i === hintSlotIdx - 1 || i === hintSlotIdx)) {
          el.classList.add('glow');
        }
        el.style.setProperty('--ball-color', COLOR_MAP[ball.color]);
        el.style.backgroundColor = COLOR_MAP[ball.color];
        row.appendChild(el);
        this._renderSlot(row, i + 1, hintSlotIdx);
      });
    },

    _renderSlot(container, index, hintIdx) {
      const slot = document.createElement('div');
      slot.className = 'insert-slot';
      if (index === hintIdx) slot.classList.add('hint');
      container.appendChild(slot);
    },

    _renderNextBall() {
      const el = document.getElementById('tutNextBall');
      if (!el) return;
      if (this.queueIdx < this.queue.length) {
        const color = this.queue[this.queueIdx];
        el.style.display = '';
        el.style.setProperty('--ball-color', COLOR_MAP[color]);
        el.style.backgroundColor = COLOR_MAP[color];
        el.style.color = COLOR_MAP[color];
        el.style.boxShadow = `0 0 28px ${COLOR_MAP[color]}, 0 0 48px ${COLOR_MAP[color]}`;
      } else {
        el.style.display = 'none';
      }
    },
  };
}

function renderGuidedChain() {
  const row = document.getElementById('tutChainRow');
  if (!row || !guidedState) return;
  row.innerHTML = '';

  const renderSlot = (container, index) => {
    const slot = document.createElement('div');
    slot.className = 'insert-slot';
    if (guidedState.done || guidedState.queueIdx >= guidedState.queue.length) {
      slot.style.opacity = '0.3';
    }
    container.appendChild(slot);
  };

  renderSlot(row, 0);
  guidedState.chain.forEach((ball, i) => {
    const el = document.createElement('div');
    el.className = 'ball';
    el.dataset.index = i;
    el.style.setProperty('--ball-color', COLOR_MAP[ball.color]);
    el.style.backgroundColor = COLOR_MAP[ball.color];
    row.appendChild(el);
    renderSlot(row, i + 1);
  });

  // Current ball
  const nextEl = document.getElementById('tutNextBall');
  if (nextEl) {
    if (guidedState.queueIdx < guidedState.queue.length && !guidedState.done) {
      const color = guidedState.queue[guidedState.queueIdx];
      nextEl.style.display = '';
      nextEl.style.setProperty('--ball-color', COLOR_MAP[color]);
      nextEl.style.backgroundColor = COLOR_MAP[color];
      nextEl.style.color = COLOR_MAP[color];
      nextEl.style.boxShadow = `0 0 28px ${COLOR_MAP[color]}, 0 0 48px ${COLOR_MAP[color]}`;
    } else {
      nextEl.style.display = 'none';
    }
  }

  // Preview remaining queue balls (next-next)
  const previewEl = document.getElementById('tutPreviewBalls');
  const previewWrapper = document.getElementById('tutNextPreview');
  if (previewEl && previewWrapper) {
    previewEl.innerHTML = '';
    let hasPreview = false;
    for (let i = guidedState.queueIdx + 1; i < guidedState.queue.length; i++) {
      if (guidedState.done) break;
      hasPreview = true;
      const dot = document.createElement('div');
      dot.className = 'next-preview-ball';
      dot.style.backgroundColor = COLOR_MAP[guidedState.queue[i]];
      dot.title = guidedState.queue[i];
      previewEl.appendChild(dot);
    }
    previewWrapper.style.display = hasPreview ? '' : 'none';
  }
}

function updateGuidedStats() {
  if (!guidedState) return;
  document.getElementById('gtStep').textContent = guidedState.steps.length;
  document.getElementById('gtRemain').textContent = guidedState.chain.length;
}

function guidedScheduleMatchCheck(checkIdx) {
  if (!guidedState) return;
  const match = findMatches(guidedState.chain, checkIdx);
  if (!match) {
    guidedState.animating = false;
    renderGuidedChain();
    updateGuidedStats();
    checkGuidedDone();
    return;
  }

  // Animate removal
  const row = document.getElementById('tutChainRow');
  if (row) {
    for (let i = match.left; i <= match.right; i++) {
      const ball = row.querySelector('.ball[data-index="' + i + '"]');
      if (ball) {
        burstParticles(ball);
        ball.classList.add('removing');
      }
    }
  }

  setTimeout(() => {
    if (!guidedState) return;
    guidedState.chain.splice(match.left, match.right - match.left + 1);
    renderGuidedChain();
    updateGuidedStats();

    const gapIdx = Math.min(match.left, guidedState.chain.length - 1);
    if (guidedState.chain.length > 0 && gapIdx >= 0) {
      setTimeout(() => guidedScheduleMatchCheck(gapIdx), 150);
    } else {
      guidedState.animating = false;
      checkGuidedDone();
    }
  }, 300);
}

function checkGuidedDone() {
  if (!guidedState || guidedState.done) return;
  if (guidedState.chain.length === 0 || guidedState.queueIdx >= guidedState.queue.length) {
    guidedState.done = true;
    renderGuidedChain();
    showGuidedResult();
  }
}

function showGuidedResult() {
  const resultEl = document.getElementById('guidedResult');
  if (!resultEl || !guidedState) return;
  resultEl.style.display = 'block';

  const cleared = guidedState.chain.length === 0;
  const steps = guidedState.steps.length;
  const par = guidedState.script.optimalSolution ? guidedState.script.optimalSolution.length : '?';
  const grade = cleared ? (steps <= par ? '⭐⭐⭐' : steps <= par * 2 ? '⭐⭐' : '⭐') : '💪';
  const titleColor = cleared ? (steps <= par ? 'var(--amber)' : 'var(--green)') : 'var(--muted)';

  resultEl.innerHTML = `
    <div class="gr-title" style="color:${titleColor};">${cleared ? '🎉 完成！' : '继续加油'} ${grade}</div>
    <div class="gr-stats">
      <div class="gr-stat">
        <div class="gr-val" style="color:${cleared ? (steps <= par ? 'var(--amber)' : 'var(--text)') : 'var(--muted)'};">${steps}</div>
        <div class="gr-label">你的步数</div>
      </div>
      <div class="gr-stat">
        <div class="gr-val" style="color:var(--gold);">${par}</div>
        <div class="gr-label">最优步数</div>
      </div>
      <div class="gr-stat">
        <div class="gr-val">${cleared ? '✓' : guidedState.chain.length}</div>
        <div class="gr-label">${cleared ? '清空' : '剩余球'}</div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-outline btn-sm" onclick="startGuidedMode('${guidedState.script.id}')">🔄 再来一次</button>
      <button class="btn btn-primary btn-sm" onclick="backToOverview()">返回列表</button>
    </div>
  `;

  if (cleared && steps <= par) {
    markTutDone(guidedState.script.id, 'completed');
  }

  // Hide hint
  const hint = document.getElementById('guidedHint');
  if (hint) hint.textContent = cleared ? '全部清空！' : '球已用完';

  // Show strategy summary for intermediate & advanced
  if (cleared && guidedState.script.tier >= 2) {
    const summarySteps = guidedState.script.steps.filter(s => s.type === 'summary');
    if (summarySteps.length > 0) {
      const s = summarySteps[0];
      const pointsHTML = s.points.map(p => `<li style="margin-bottom:4px;">${p}</li>`).join('');
      resultEl.innerHTML += `
        <div style="margin-top:12px;text-align:left;background:rgba(255,208,96,0.04);border-radius:10px;padding:14px;border:1px solid rgba(255,208,96,0.1);">
          <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;text-align:center;">${s.title}</div>
          <ol style="padding-left:16px;font-size:11px;color:var(--text);line-height:1.7;">${pointsHTML}</ol>
          <div style="margin-top:8px;font-size:10px;color:var(--amber);text-align:center;">💡 ${s.tip}</div>
        </div>`;
    }
  }
}

function showOptimalModal(script) {
  let sol = script.optimalSolution;
  // Trigger lazy BFS for advanced level
  if (!sol && script.getOptimal) {
    sol = script.getOptimal();
  }
  if (!sol || sol.length === 0) {
    alert('暂无最优解数据，请尝试自己探索！');
    return;
  }
  const stepsText = sol.map((s, i) => `第${i+1}步：插入位置 ${s.slot}`).join('<br>');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'optModal';
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>💡 最优解</h3>
      <p>最少 <strong>${sol.length}</strong> 步清空全部球</p>
      <div style="text-align:left;font-size:13px;color:var(--text);line-height:2;margin:12px 0;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;">
        ${stepsText}
      </div>
      <button class="modal-btn primary" id="optModalClose">知道了</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.getElementById('optModalClose').addEventListener('click', () => overlay.remove());
}

let gameState = null; // { level, chain[], queue[], queueIdx, steps, comboChain, animating, selectedSlot, allCleared }

function startLevel(id) {
  sessionStorage.setItem('currentLevelId', id);
  router.navigate('#game');
}

function retryLevel() {
  // Re-init with same level
  initGame();
}

function finishLevel() {
  if (!gameState) return;
  const gs = gameState;
  sessionStorage.setItem('gameResult', JSON.stringify({
    levelId: gs.level.id,
    steps: gs.steps,
    par: gs.level.par,
    allCleared: gs.allCleared,
    totalCombos: gs.totalCombos,
    maxChain: gs.maxChain
  }));
  router.navigate('#result');
}

function initGame() {
  const idStr = sessionStorage.getItem('currentLevelId');
  const id = idStr ? parseInt(idStr) : 1;
  const level = getLevel(id);
  if (!level) { router.navigate('#levels'); return; }

  document.getElementById('headerRight').innerHTML = '';

  // Reset game state
  gameState = {
    level: level,
    chain: level.chain_spec.map((c, i) => ({ color: c, id: i })),
    nextId: level.chain_spec.length,
    queue: [...level.queue_spec],
    queueIdx: 0,
    steps: 0,
    comboChain: 0,
    totalCombos: 0,
    maxChain: 0,
    animating: false,
    selectedSlot: 0,
    allCleared: false,
    levelEnded: false
  };

  // Clamp selectedSlot
  gameState.selectedSlot = 0;

  // Update UI
  document.getElementById('levelEndOverlay').style.display = 'none';
  document.getElementById('hintBar').textContent = level.tutorial_hint || '';
  updateGameStats();
  renderQueue();
  renderChain();
}

function updateGameStats() {
  const gs = gameState;
  if (!gs) return;
  document.getElementById('gStatStep').textContent = gs.steps;
  document.getElementById('gStatCombo').textContent = gs.comboChain;
  document.getElementById('gStatRemain').textContent = gs.chain.length;
  document.getElementById('gStatPar').textContent = gs.level.par;
}

function renderQueue() {
  const gs = gameState;
  if (!gs) return;

  const queueNext = document.getElementById('queueNext');
  const queueRemaining = document.getElementById('queueRemaining');

  if (gs.queueIdx >= gs.queue.length) {
    // Queue exhausted
    queueNext.style.backgroundColor = '#555';
    queueNext.style.boxShadow = 'none';
    queueNext.style.animation = 'none';
    queueRemaining.innerHTML = '<span style="font-size:11px;color:var(--muted);">(已用完)</span>';
    document.getElementById('queueBar').style.opacity = '0.6';
    return;
  }

  document.getElementById('queueBar').style.opacity = '1';
  const currentColor = gs.queue[gs.queueIdx];
  queueNext.style.setProperty('--ball-color', COLOR_MAP[currentColor]);
  queueNext.style.backgroundColor = COLOR_MAP[currentColor];
  queueNext.style.color = COLOR_MAP[currentColor];
  queueNext.style.boxShadow = `0 0 16px ${COLOR_MAP[currentColor]}`;
  queueNext.style.animation = 'pulse-glow 1.2s ease-in-out infinite';

  // Remaining queue balls
  let dots = '';
  for (let i = gs.queueIdx + 1; i < gs.queue.length; i++) {
    dots += `<div class="qr-dot" style="--ball-color:${COLOR_MAP[gs.queue[i]]};background-color:${COLOR_MAP[gs.queue[i]]};"></div>`;
  }
  queueRemaining.innerHTML = dots || '<span style="font-size:11px;color:var(--muted);">最后</span>';
}

function renderChain() {
  const gs = gameState;
  if (!gs) return;

  const row = document.getElementById('chainRow');
  row.innerHTML = '';

  gs.selectedSlot = Math.min(gs.selectedSlot, gs.chain.length);

  const BALLS_PER_ROW = 5;
  const totalRows = Math.ceil((gs.chain.length + 1) / BALLS_PER_ROW);

  for (let r = 0; r < totalRows; r++) {
    const startIdx = r * BALLS_PER_ROW;
    const endIdx = Math.min(startIdx + BALLS_PER_ROW, gs.chain.length);
    const isReverse = (r % 2 === 1); // even rows: right→left

    // Connector between rows
    if (r > 0) {
      const conn = document.createElement('div');
      conn.className = 'chain-connector';
      row.appendChild(conn);
    }

    const subrow = document.createElement('div');
    subrow.className = 'chain-subrow' + (isReverse ? ' reverse' : '');

    if (isReverse) {
      // Right-to-left: slot[endIdx], ball[endIdx-1], slot[endIdx-1], ..., ball[startIdx], slot[startIdx]
      renderInsertSlot(subrow, endIdx);
      for (let i = endIdx - 1; i >= startIdx; i--) {
        const el = document.createElement('div');
        el.className = 'ball';
        el.dataset.index = i;
        el.style.setProperty('--ball-color', COLOR_MAP[gs.chain[i].color]);
        el.style.backgroundColor = COLOR_MAP[gs.chain[i].color];
        el.textContent = gs.chain[i].color.charAt(0).toUpperCase();
        subrow.appendChild(el);
        renderInsertSlot(subrow, i);
      }
    } else {
      // Left-to-right: slot[startIdx], ball[startIdx], slot[startIdx+1], ...
      renderInsertSlot(subrow, startIdx);
      for (let i = startIdx; i < endIdx; i++) {
        const el = document.createElement('div');
        el.className = 'ball';
        el.dataset.index = i;
        el.style.setProperty('--ball-color', COLOR_MAP[gs.chain[i].color]);
        el.style.backgroundColor = COLOR_MAP[gs.chain[i].color];
        el.textContent = gs.chain[i].color.charAt(0).toUpperCase();
        subrow.appendChild(el);
        renderInsertSlot(subrow, i + 1);
      }
    }

    row.appendChild(subrow);
  }

  updateGameStats();
  updateSlotHint();
}

function renderInsertSlot(container, index) {
  const gs = gameState;
  const slot = document.createElement('div');
  slot.className = 'insert-slot';
  slot.dataset.index = index;
  if (index === gs.selectedSlot) slot.classList.add('selected');

  const label = document.createElement('span');
  label.className = 'slot-idx';
  label.textContent = index;
  slot.appendChild(label);

  container.appendChild(slot);
}

/** Double-click/tap on a slot triggers insertion */
function updateSlotHint() {
  const gs = gameState;
  if (!gs) return;
  const hint = document.getElementById('hintBar');
  if (gs.chain.length === 0) {
    hint.textContent = '';
    return;
  }
  if (gs.queueIdx >= gs.queue.length && !gs.levelEnded) {
    hint.textContent = '球已用完！点击下方按钮查看结果';
  }
}

// Click on insertion slot = insert immediately (one-click)
document.getElementById('chainRow').addEventListener('click', function(e) {
  const gs = gameState;
  if (!gs || gs.animating || gs.levelEnded) return;
  if (gs.queueIdx >= gs.queue.length) return;

  const slot = e.target.closest('.insert-slot');
  if (!slot) return;

  const idx = parseInt(slot.dataset.index);
  if (isNaN(idx) || idx < 0 || idx > gs.chain.length) return;

  // Insert immediately at this slot
  const color = gs.queue[gs.queueIdx];
  gs.selectedSlot = idx;
  gs.steps++;
  gs.comboChain = 0;
  gs.chain.splice(idx, 0, { color, id: gs.nextId++ });
  gs.queueIdx++;

  renderChain();
  renderQueue();

  // Trigger match detection
  scheduleMatchCheck(idx);

  // Advance selectedSlot past the newly inserted ball
  gs.selectedSlot = Math.min(idx + 1, gs.chain.length);
});

// ---- Match detection ----
function findMatches(arr, startIdx) {
  if (startIdx < 0 || startIdx >= arr.length) return null;
  const color = arr[startIdx].color;
  let left = startIdx;
  while (left > 0 && arr[left - 1].color === color) left--;
  let right = startIdx;
  while (right < arr.length - 1 && arr[right + 1].color === color) right++;
  const count = right - left + 1;
  return count >= 3 ? { left, right, count } : null;
}

function scheduleMatchCheck(checkIdx) {
  const gs = gameState;
  if (!gs) return;

  const match = findMatches(gs.chain, checkIdx);
  if (!match) {
    gs.selectedSlot = Math.min(gs.selectedSlot, gs.chain.length);
    gs.animating = false;
    renderChain();
    renderQueue();
    updateGameStats();

    // Level end conditions
    checkLevelEnd();
    return;
  }

  gs.animating = true;
  gs.comboChain++;
  gs.totalCombos++;
  if (gs.comboChain > gs.maxChain) gs.maxChain = gs.comboChain;

  // Update combo display during animation
  updateGameStats();

  // Animate removal
  animateRemoval(match, () => {
    // Remove
    gs.chain.splice(match.left, match.right - match.left + 1);
    renderChain();
    renderQueue();

    // Chain reaction check at gap
    const gapIdx = Math.min(match.left, gs.chain.length - 1);

    if (gs.chain.length === 0) {
      gs.allCleared = true;
      gs.animating = false;
      gs.levelEnded = true;
      updateGameStats();
      showLevelEnd();
    } else if (gapIdx >= 0) {
      setTimeout(() => scheduleMatchCheck(gapIdx), 120);
    } else {
      gs.selectedSlot = Math.min(gs.selectedSlot, gs.chain.length);
      gs.animating = false;
      renderChain();
      renderQueue();
      updateGameStats();
    }
  });
}

function burstParticles(ballEl) {
  if (!ballEl) return;
  const rect = ballEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const color = ballEl.style.backgroundColor || ballEl.style.getPropertyValue('--ball-color') || '#fff';
  const count = 8;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = 18 + Math.random() * 22;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:5px; height:5px;
      background:${color};
      --dx:${Math.cos(angle) * dist}px;
      --dy:${Math.sin(angle) * dist}px;
      box-shadow:0 0 6px ${color};
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

function animateRemoval(match, callback) {
  const row = document.getElementById('chainRow');
  for (let i = match.left; i <= match.right; i++) {
    const ball = row.querySelector('.ball[data-index="' + i + '"]');
    if (ball) {
      burstParticles(ball);
      ball.classList.add('removing');
    }
  }
  setTimeout(callback, 300);
}

function checkLevelEnd() {
  const gs = gameState;
  if (gs.levelEnded) return;
  if (gs.allCleared) {
    gs.levelEnded = true;
    showLevelEnd();
  } else if (gs.queueIdx >= gs.queue.length && !gs.animating) {
    // Queue exhausted, chain not empty
    gs.levelEnded = true;
    showLevelEnd();
  }
}

function showLevelEnd() {
  const gs = gameState;
  const overlay = document.getElementById('levelEndOverlay');
  const card = document.getElementById('levelEndCard');
  const level = gs.level;
  const stars = gs.allCleared ? (gs.steps <= level.par ? 3 : gs.steps <= level.par * 2 ? 2 : 1) : 0;
  const hasNext = gs.allCleared && isLevelUnlocked(level.id + 1) && getLevel(level.id + 1);

  let starsHTML = '';
  for (let i = 0; i < 3; i++) {
    starsHTML += `<span style="font-size:32px;${i < stars ? 'color:var(--gold);text-shadow:0 0 12px rgba(255,208,96,0.5);' : 'color:#3a3025;'}">★</span>`;
  }

  const titleText = stars === 3 ? '🎉 完美通关！' : stars >= 1 ? '✅ 顺利通关！' : '💪 继续加油';
  const titleColor = stars === 3 ? 'var(--amber)' : stars >= 1 ? 'var(--green)' : 'var(--muted)';

  card.innerHTML = `
    <div style="font-size:22px;font-weight:700;color:${titleColor};margin-bottom:4px;">${titleText}</div>
    <div style="margin-bottom:12px;">${starsHTML}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">
      关卡 ${level.id} · ${level.name}
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;">
      <div style="background:var(--surface3);padding:8px 14px;border-radius:8px;text-align:center;min-width:50px;">
        <div style="font-size:20px;font-weight:700;color:${gs.steps <= level.par ? 'var(--amber)' : 'var(--text)'};">${gs.steps}</div>
        <div style="font-size:9px;color:var(--muted);">步数 / Par ${level.par}</div>
      </div>
      <div style="background:var(--surface3);padding:8px 14px;border-radius:8px;text-align:center;min-width:50px;">
        <div style="font-size:20px;font-weight:700;color:${gs.maxChain >= 2 ? 'var(--yellow)' : 'var(--text)'};">${gs.maxChain}</div>
        <div style="font-size:9px;color:var(--muted);">最大连锁</div>
      </div>
      <div style="background:var(--surface3);padding:8px 14px;border-radius:8px;text-align:center;min-width:50px;">
        <div style="font-size:20px;font-weight:700;">${gs.totalCombos}</div>
        <div style="font-size:9px;color:var(--muted);">消除次数</div>
      </div>
    </div>
    ${level.strategy_tip ? `<div style="background:rgba(255,208,96,0.06);border:1px solid rgba(255,208,96,0.12);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--gold-dim);line-height:1.6;">💡 ${level.strategy_tip}</div>` : ''}
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${hasNext ? `<button class="btn btn-accent" onclick="closeLevelEnd(); startLevel(${level.id + 1})" style="width:100%;justify-content:center;padding:12px;font-size:14px;">下一关 →</button>` : ''}
      <button class="btn btn-outline" onclick="closeLevelEnd(); retryLevel()" style="width:100%;justify-content:center;">🔄 再试一次</button>
      <button class="btn btn-outline btn-sm" onclick="closeLevelEnd(); router.navigate('#levels')" style="width:100%;justify-content:center;">✕ 退出</button>
    </div>
  `;

  overlay.style.display = 'flex';
  document.getElementById('hintBar').textContent = '';
  updateGameStats();
  updateLevelProgress(level.id, gs.steps, gs.allCleared);
}

function closeLevelEnd() {
  document.getElementById('levelEndOverlay').style.display = 'none';
}

function initResult() {
  document.getElementById('headerRight').innerHTML =
    '<button class="nav-btn" onclick="router.navigate(\'#levels\')">关卡列表 →</button>';

  const raw = sessionStorage.getItem('gameResult');
  if (!raw) {
    document.getElementById('resultCard').innerHTML =
      '<p style="color:var(--muted);">没有游戏数据</p>';
    return;
  }

  const r = JSON.parse(raw);
  const level = getLevel(r.levelId);
  if (!level) {
    document.getElementById('resultCard').innerHTML =
      '<p style="color:var(--muted);">关卡数据未找到</p>';
    return;
  }

  const stars = r.allCleared ? (r.steps <= r.par ? 3 : r.steps <= r.par * 2 ? 2 : 1) : 0;
  const gradeText = stars === 3 ? '完美通关!' : stars === 2 ? '优秀!' : stars === 1 ? '通关' : '继续加油';
  const gradeColor = stars === 3 ? 'var(--accent)' : stars >= 1 ? 'var(--green)' : 'var(--muted)';

  const hasNext = isLevelUnlocked(r.levelId + 1) || (r.allCleared && r.levelId < ZUMA_LEVELS.length);

  document.getElementById('resultCard').innerHTML = `
    <div class="result-stars fade-in">${renderStars(stars)}</div>
    <div class="result-grade fade-in delay-1" style="color:${gradeColor};">${gradeText}</div>
    <div style="font-size:14px;color:var(--muted);" class="fade-in delay-1">
      关卡 ${r.levelId} · ${level.name}
    </div>
    <div class="result-stats fade-in delay-2">
      <div class="result-stat ${r.steps <= r.par ? 'great' : 'good'}">
        <div class="rs-val">${r.steps}</div>
        <div class="rs-label">使用步数 (Par: ${r.par})</div>
      </div>
      <div class="result-stat ${r.allCleared ? 'great' : ''}">
        <div class="rs-val">${r.allCleared ? '✓' : '✗'}</div>
        <div class="rs-label">全部清除</div>
      </div>
      <div class="result-stat ${r.maxChain >= 2 ? 'great' : ''}">
        <div class="rs-val">${r.maxChain}</div>
        <div class="rs-label">最大连锁</div>
      </div>
      <div class="result-stat">
        <div class="rs-val">${r.totalCombos}</div>
        <div class="rs-label">总消除次数</div>
      </div>
    </div>
    <div class="result-skills fade-in delay-2">
      <span style="font-size:12px;color:var(--muted);">技能标签:</span>
      ${level.skill_focus.map(s => `<span class="skill-tag">${s}</span>`).join('')}
    </div>
    <div class="btn-row fade-in delay-3">
      <button class="btn btn-outline" onclick="retryLevelFromResult()">🔄 再来一次</button>
      ${hasNext ? `<button class="btn btn-primary" onclick="nextLevel(${r.levelId})">下一关 →</button>` : ''}
      <button class="btn btn-outline btn-sm" onclick="router.navigate('#levels')">📋 关卡列表</button>
    </div>
  `;
}

function retryLevelFromResult() {
  const raw = sessionStorage.getItem('gameResult');
  if (raw) {
    const r = JSON.parse(raw);
    sessionStorage.setItem('currentLevelId', r.levelId);
    router.navigate('#game');
  }
}

function nextLevel(currentId) {
  const nextId = currentId + 1;
  if (getLevel(nextId) || isLevelUnlocked(nextId)) {
    sessionStorage.setItem('currentLevelId', nextId);
    router.navigate('#game');
  } else {
    router.navigate('#levels');
  }
}

// ======================================================================
// PAGE 5: GRADUATION
// ======================================================================
function initGraduation() {
  if (!isAllCompleted()) {
    router.navigate('#levels');
    return;
  }

  document.getElementById('headerRight').innerHTML = '';

  const progress = loadProgress();
  let totalStars = 0;
  let totalSteps = 0;
  ZUMA_LEVELS.forEach(lv => {
    const p = progress[lv.id];
    if (p) {
      totalStars += p.stars || 0;
      totalSteps += p.bestSteps || 0;
    }
  });

  const maxStars = ZUMA_LEVELS.length * 3;

  document.getElementById('gradContent').innerHTML = `
    <div class="grad-icon fade-in">🎓</div>
    <div class="grad-title fade-in delay-1">恭喜毕业！</div>
    <p style="color:var(--muted);max-width:320px;line-height:1.6;" class="fade-in delay-1">
      你已完成全部 <strong>${ZUMA_LEVELS.length}</strong> 关祖玛训练，<br>
      掌握了三消的核心技巧！
    </p>
    <div class="grad-stats fade-in delay-2">
      <div class="grad-stat">
        <div class="gs-val">${totalStars}/${maxStars}</div>
        <div class="gs-label">累计星星</div>
      </div>
      <div class="grad-stat">
        <div class="gs-val">${totalSteps}</div>
        <div class="gs-label">累计步数</div>
      </div>
      <div class="grad-stat">
        <div class="gs-val">${countCompletedLevels()}</div>
        <div class="gs-label">通关关卡</div>
      </div>
    </div>
    <div class="btn-row fade-in delay-3">
      <button class="btn btn-accent" onclick="resetAllProgress()">🔄 重置进度</button>
      <button class="btn btn-outline" onclick="router.navigate('#levels')">📋 返回关卡</button>
    </div>
  `;
}

function resetAllProgress() {
  if (confirm('确定要清除所有关卡进度吗？此操作不可撤销。')) {
    localStorage.removeItem(STORAGE_KEY);
    router.navigate('#levels');
  }
}

// ======================================================================
// BOOTSTRAP
// ======================================================================
(function boot() {
  // Pre-verify BFS for intermediate (async, doesn't block page)
  setTimeout(() => {
    if (TUTORIAL_SCRIPTS[1] && TUTORIAL_SCRIPTS[1].getOptimal) {
      console.log('Verifying: 中阶教学');
      TUTORIAL_SCRIPTS[1].getOptimal();
    }
  }, 500);

  // Determine initial page
  const hash = window.location.hash;
  if (hash) {
    router.navigate(hash);
  } else {
    router.navigate('#home');
  }
})();
</script>
</body>
</html>
